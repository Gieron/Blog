<html>
    <head>
        <title>Manual page breaks</title>
        <style>
            @media print {
                h1 {
                    break-after: avoid;
                }
                p {
                    break-inside: avoid;
                }
            }
        </style>
        <script>
            // AI generated code, somewhat edited
            function generateRandomText() {
                const loremIpsum = "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";
                const sentences = loremIpsum.split('. ');
                const randomSentences = [];
                const numSentences = Math.floor(Math.random() * 5) + 1; // Random number of sentences (1-5)

                for (let i = 0; i < numSentences; i++) {
                    const randomIndex = Math.floor(Math.random() * sentences.length);
                    randomSentences.push(sentences[randomIndex]);
                }

                return randomSentences.join('. ') + '.';
            }

            function generateRandomWord() {
                const words = ["Apple", "Banana", "Cherry", "Dragonfruit", "Elderberry", "Fig", "Grape", "Honeydew", "Kiwi", "Lemon", "Mango", "Nectarine", "Orange", "Peach", "Quince", "Raspberry", "Strawberry", "Tangerine", "Watermelon", "Blueberry"];
                const randomIndex = Math.floor(Math.random() * words.length);
                return words[randomIndex];
            }

            function generateArticles() {
                for (let i = 0; i < 20; i++) {
                    const article = document.createElement('article');
                    const heading = document.createElement('h1');
                    heading.textContent = generateRandomWord();
                    article.appendChild(heading);

                    const numParagraphs = Math.floor(Math.random() * 5) + 1; // Random number of paragraphs (1-5)
                    for (let j = 0; j < numParagraphs; j++) {
                        const paragraph = document.createElement('p');
                        paragraph.textContent = generateRandomText();
                        article.appendChild(paragraph);
                    }

                    document.body.appendChild(article);
                }
            }

            window.setTimeout(generateArticles, 0);

            window.setTimeout(window.print, 400);
        </script>
    </head>
